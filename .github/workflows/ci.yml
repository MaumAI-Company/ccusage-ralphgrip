name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: TypeCheck
        run: pnpm --filter dashboard exec tsc --noEmit
      - name: Lint
        run: pnpm --filter dashboard lint
      - name: Build
        run: pnpm --filter dashboard build
      - name: Unit tests (dashboard)
        run: pnpm --filter dashboard test
      - name: Unit tests (plugin)
        run: node --test plugin/scripts/lib/*.test.mjs
